<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAR Quest: CPA Study Realm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="app-header">
        <div class="stats-bar">
            <span id="streak-counter" title="Daily Study Streak">🔮 Streak: 0</span>
            <span id="score-counter" title="Total Points">👑 Gold: 0</span>
            <span id="player-rank" title="Current Rank">🧟‍♂️ Zombie of the Ledger</span>
        </div>
        <button id="theme-toggle" class="btn-theme">🪄 Toggle Realm</button>
    </header>

    <main class="container">
        <div id="quest-board" class="card">
            
            <div class="card-header">
                <span id="category-badge" class="badge">Summoning Topic...</span>
                <span id="question-type-badge" class="badge-secondary">Type</span>
            </div>
            
            <h2 id="question-text">Gazing into the orb to find your next encounter...</h2>
            
            <div id="exhibits-container" class="hidden">
                </div>

            <div id="interactive-container">
                </div>

            <div id="explanation-box" class="hidden">
                <h3 id="feedback-title"></h3>
                <p id="feedback-text"></p>
            </div>

            <div class="card-footer">
                <button id="action-btn" class="btn-primary" disabled>Cast Answer ⚡</button>
            </div>

        </div>
    </main>

    <footer>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
